name: Deploy scheduler
on:
  push:
    branches: [main]
    paths:
      - 'scheduler/**'
      - 'backend/app/**'
      - 'backend/pyproject.toml'

jobs:
  deploy-scheduler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/unichat
            git fetch --all
            git reset --hard origin/main
            cd scheduler
            ./.venv-uv/bin/python -m pip install -e ".[dev]" -e ../backend --upgrade
            sudo systemctl restart unichat-scheduler
            sudo systemctl status unichat-scheduler --no-pager
